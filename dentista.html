<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OdontoFlow - Escolher Dentista</title>

  <link rel="stylesheet" href="./styles/index.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" 
    rel="stylesheet"
  />
</head>

<body class="booking-page">
  <header class="booking-header">
    <div class="container booking-header-content">
      <a href="./agendamento.html" class="back-button">←</a>

      <div class="logo booking-logo" aria-hidden="true">
        <span class="logo-icon">🦷</span>
        <span>OdontoFlow</span>
      </div>
    </div>
  </header>

  <main>
    <section class="steps-section">
      <div class="container">
        <div class="steps">
          <div class="step completed">
            <span>✓</span>
            <strong>Procedimento</strong>
          </div>

          <div class="step-line completed"></div>

          <div class="step active">
            <span>2</span>
            <strong>Dentista</strong>
          </div>

          <div class="step-line"></div>

          <div class="step">
            <span>3</span>
            <strong>Data e Horário</strong>
          </div>

          <div class="step-line"></div>

          <div class="step">
            <span>4</span>
            <strong>Dados</strong>
          </div>

          <div class="step-line"></div>

          <div class="step">
            <span>5</span>
            <strong>Confirmação</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="appointment-flow">
      <div class="container appointment-container">
        <div class="appointment-title">
          <h1>Escolha o dentista</h1>
          <p>Selecione o profissional de sua preferência.</p>
        </div>

        <div class="dentist-grid"></div>

        <div class="appointment-actions">
          <a href="./agendamento.html" class="btn btn-outline-neutral">Voltar</a>

          <a href="./data-horario.html" class="btn btn-primary continue-button disabled-link">
            Continuar
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./scripts/supabase.js"></script>
  <script src="./scripts/storage.js"></script>
  <script src="./scripts/dentista.js"></script>
</body>
</html>
