<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>OdontoFlow - Login Admin</title>

  <link rel="stylesheet" href="./styles/index.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" 
    rel="stylesheet"
  />
</head>

<body class="admin-login-page">

  <main class="admin-login-wrapper">
    <section class="admin-login-card">
      <div class="admin-login-brand">
        <span>🦷</span>
        <strong>OdontoFlow</strong>
      </div>

      <div class="admin-login-heading">
        <h1>Área Clínica</h1>
        <p>Acesse o painel administrativo da clínica.</p>
      </div>

      <form class="admin-login-form" id="adminLoginForm">
        <div class="form-group">
          <label for="adminEmail">E-mail</label>
          <input 
            type="email" 
            id="adminEmail" 
            placeholder="admin@clinica.com"
            autocomplete="email"
          />
        </div>

        <div class="form-group">
          <label for="adminPassword">Senha</label>
          <input 
            type="password" 
            id="adminPassword" 
            placeholder="Digite sua senha"
            autocomplete="current-password"
          />
        </div>

        <button type="submit" class="admin-primary-btn" id="adminLoginButton">
          Entrar no painel
        </button>
      </form>

      <div class="admin-login-help">
        <strong>Teste rápido:</strong>
        <span>admin@clinica.com / 123456</span>
      </div>

      <a href="./index.html" class="admin-login-back">
        ← Voltar para o site
      </a>
    </section>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./scripts/supabase.js"></script>
  <script src="./scripts/admin-login.js"></script>
</body>
</html>
