<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OdontoFlow - Dados do Paciente</title>

  <link rel="stylesheet" href="./styles/index.css" />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link 
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" 
    rel="stylesheet"
  />
</head>

<body class="booking-page">
  <header class="booking-header">
    <div class="container booking-header-content">
      <a href="./data-horario.html" class="back-button">←</a>

      <div class="logo booking-logo" aria-hidden="true">
        <span class="logo-icon">🦷</span>
        <span>OdontoFlow</span>
      </div>
    </div>
  </header>

  <main>
    <section class="steps-section">
      <div class="container">
        <div class="steps">
          <div class="step completed">
            <span>✓</span>
            <strong>Procedimento</strong>
          </div>

          <div class="step-line completed"></div>

          <div class="step completed">
            <span>✓</span>
            <strong>Dentista</strong>
          </div>

          <div class="step-line completed"></div>

          <div class="step completed">
            <span>✓</span>
            <strong>Data e Horário</strong>
          </div>

          <div class="step-line completed"></div>

          <div class="step active">
            <span>4</span>
            <strong>Dados</strong>
          </div>

          <div class="step-line"></div>

          <div class="step">
            <span>5</span>
            <strong>Confirmação</strong>
          </div>
        </div>
      </div>
    </section>

    <section class="appointment-flow">
      <div class="container appointment-container">
        <div class="appointment-title">
          <h1>Seus dados</h1>
          <p>Preencha seus dados para finalizar o agendamento.</p>
        </div>

        <form class="patient-form-card" id="patientForm">
          <div class="form-group full">
            <label for="nome">Nome completo *</label>
            <input 
              type="text" 
              id="nome" 
              placeholder="Seu nome completo" 
              maxlength="80" 
              autocomplete="name" 
            />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="telefone">Telefone *</label>
              <input 
                type="text" 
                id="telefone" 
                placeholder="(11) 99999-9999" 
                maxlength="15" 
                inputmode="numeric" 
                autocomplete="tel" 
              />
            </div>

            <div class="form-group">
              <label for="email">E-mail *</label>
              <input 
                type="email" 
                id="email" 
                placeholder="seu@email.com" 
                maxlength="120" 
                autocomplete="email" 
              />
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="cpf">CPF <span>(opcional)</span></label>
              <input 
                type="text" 
                id="cpf" 
                placeholder="000.000.000-00" 
                maxlength="14" 
                inputmode="numeric" 
                autocomplete="off" 
              />
            </div>

            <div class="form-group">
              <label for="nascimento">Data de nascimento <span>(opcional)</span></label>
              <input 
                type="text" 
                id="nascimento" 
                placeholder="dd/mm/aaaa" 
                maxlength="10" 
                inputmode="numeric" 
                autocomplete="bday" 
              />
            </div>
          </div>

          <div class="form-group full">
            <label for="observacoes">Observações</label>
            <textarea 
              id="observacoes" 
              placeholder="Alguma informação adicional?" 
              maxlength="300"
            ></textarea>
          </div>
        </form>

        <div class="appointment-actions">
          <a href="./data-horario.html" class="btn btn-outline-neutral">Voltar</a>
          <a href="./confirmacao.html" class="btn btn-primary continue-button disabled-link">
            Continuar
          </a>
        </div>
      </div>
    </section>
  </main>

  <script src="./scripts/storage.js"></script>
  <script src="./scripts/dados.js"></script>
</body>
</html>
